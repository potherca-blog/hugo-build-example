---
name: Example workflow calling Hugo build

on:
  workflow_dispatch:

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

  build:
    needs: checkout
    uses: potherca/hugo-build/.github/workflows/hugo-build.yaml@main

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/upload-artifact@v7
        with:
          # (Optional) Name of the artifact to upload. Default is 'artifact'
          name: github-pages
          # Path or wildcard pattern of what to upload
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    name: Deploy to GitHub Pages
    needs: upload
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
