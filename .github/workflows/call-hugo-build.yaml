---
name: Example workflow calling Hugo build

on:
  workflow_dispatch:

jobs:
  build:
    uses: potherca/hugo-build/.github/workflows/hugo-build.yaml@main
    with:
      config-module-imports: |
        { "path": "github.com/McShelby/hugo-theme-relearn" }
      # (Optional) Docker image to use for building the Hugo site
      docker-image: ghcr.io/hugomods/hugo:std-go-git
      # (Optional) Path to build the Hugo site from, defaults to ./
      path: ./

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    name: Deploy to GitHub Pages
    needs: build
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
